name: shabakti
description: "Shabakti - Internet Package Subscription App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.3
  iconsax_flutter: ^1.0.0
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  smooth_page_indicator: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
